{% extends "admin/index.html" %}
{% load static %}

{% block content %}
<div style="margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap;">
    
    <a href="/admin/registre/actenaissance/" style="text-decoration: none; flex: 1; min-width: 140px;">
        <div style="background: #417690; color: white; padding: 12px; border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h3 style="margin: 0 0 5px 0; color: white; font-size: 13px; text-transform: uppercase;">Total Général</h3>
            <p style="font-size: 28px; font-weight: bold; margin: 0;">{{ total_naissances }}</p>
        </div>
    </a>

    <a href="/admin/registre/actenaissance/?sexe__exact=M" style="text-decoration: none; flex: 1; min-width: 140px;">
        <div style="background: #28a745; color: white; padding: 12px; border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h3 style="margin: 0 0 5px 0; color: white; font-size: 13px; text-transform: uppercase;">Garçons</h3>
            <p style="font-size: 28px; font-weight: bold; margin: 0;">{{ naissances_garcons }}</p>
        </div>
    </a>

    <a href="/admin/registre/actenaissance/?sexe__exact=F" style="text-decoration: none; flex: 1; min-width: 140px;">
        <div style="background: #e83e8c; color: white; padding: 12px; border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h3 style="margin: 0 0 5px 0; color: white; font-size: 13px; text-transform: uppercase;">Filles</h3>
            <p style="font-size: 28px; font-weight: bold; margin: 0;">{{ naissances_filles }}</p>
        </div>
    </a> 

    <a href="/admin/registre/actenaissance/?date_declaration__year={{ annee_en_cours }}" style="text-decoration: none; flex: 1; min-width: 140px;">
        <div style="background: #ffc107; color: #333; padding: 12px; border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h3 style="margin: 0 0 5px 0; color: #333; font-size: 13px; text-transform: uppercase;">Cette Année</h3>
            <p style="font-size: 28px; font-weight: bold; margin: 0;">{{ naissances_annee }}</p>
        </div>
    </a>

</div>

{{ block.super }}

{% endblock %}
